<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>peregrine · telemetry</title>
<style>
  /* ── Instrument-panel design tokens ──────────────────────────────── */
  :root {
    --bg: #06080c;
    --bg-panel: #0c1119;
    --bg-panel-2: #0e1420;
    --bg-plot: #070b12;
    --border: rgba(120, 145, 180, 0.14);
    --border-strong: rgba(120, 145, 180, 0.28);
    --text: #dce4f0;
    --text-dim: #8b9bb4;
    --text-faint: #4a5a72;
    --blue: #4d9fff;
    --blue-dim: rgba(77, 159, 255, 0.15);
    --green: #2ee6a6;
    --green-dim: rgba(46, 230, 166, 0.12);
    --yellow: #ffb340;
    --yellow-dim: rgba(255, 179, 64, 0.12);
    --red: #ff5c7a;
    --red-dim: rgba(255, 92, 122, 0.12);
    --violet: #a78bff;
    --violet-dim: rgba(167, 139, 255, 0.12);
    --cyan: #22d3ee;
    --cyan-dim: rgba(34, 211, 238, 0.12);
    --grid-line: rgba(120, 145, 180, 0.08);
    --shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout shell ────────────────────────────────────────────────── */
  .shell { max-width: 1600px; margin: 0 auto; padding: 0; }

  /* ── Top bar — compact instrument header ─────────────────────────── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 20px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border-strong);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(12px);
  }
  .topbar .brand {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.06em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .topbar .brand .dot {
    width: 7px; height: 7px; border-radius: 2px;
    background: var(--blue);
    box-shadow: 0 0 8px var(--blue);
  }
  .topbar .sep { width: 1px; height: 18px; background: var(--border-strong); }
  .topbar .meta { color: var(--text-dim); font-size: 12px; font-variant-numeric: tabular-nums; }
  .topbar .spacer { flex: 1; }
  .topbar .poll-time { color: var(--text-faint); font-size: 11px; font-variant-numeric: tabular-nums; }

  .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-variant-numeric: tabular-nums;
  }
  .status-pill::before {
    content: ""; width: 6px; height: 6px; border-radius: 999px; background: currentColor;
  }
  .status-pill.idle { color: var(--green); background: var(--green-dim); }
  .status-pill.busy { color: var(--yellow); background: var(--yellow-dim); }
  .status-pill.err  { color: var(--red); background: var(--red-dim); }
  .status-pill.connecting { color: var(--text-faint); background: rgba(120,145,180,0.08); }

  /* ── Section headings ────────────────────────────────────────────── */
  .section-label {
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--text-faint);
    padding: 18px 20px 8px;
  }

  /* ── Hero cards — primary KPIs with mini-spark ───────────────────── */
  .hero-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .hero {
    background: var(--bg-panel);
    padding: 16px 18px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: relative;
    overflow: hidden;
  }
  .hero .h-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--text-dim);
    display: flex; align-items: center; gap: 6px;
  }
  .hero .h-label .ind {
    width: 6px; height: 6px; border-radius: 2px; background: var(--tone, var(--blue));
  }
  .hero .h-value {
    font-size: 28px; font-weight: 800; line-height: 1; letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  .hero .h-value .unit { font-size: 14px; font-weight: 600; color: var(--text-dim); margin-left: 2px; }
  .hero .h-sub {
    font-size: 11px; color: var(--text-faint); font-variant-numeric: tabular-nums;
  }
  .hero .h-spark {
    position: absolute; left: 0; right: 0; bottom: 0; height: 28px; opacity: 0.5;
  }

  /* ── Stat strip — secondary metrics ──────────────────────────────── */
  .stat-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .stat {
    flex: 1; min-width: 120px;
    background: var(--bg-panel);
    padding: 10px 14px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .stat .s-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-faint); }
  .stat .s-value { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text); }
  .stat .s-value.dim { color: var(--text-dim); }

  /* ── Chart grid ──────────────────────────────────────────────────── */
  .chart-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .chart-card {
    background: var(--bg-panel);
    padding: 14px 16px 10px;
    display: flex; flex-direction: column; gap: 8px;
    min-height: 200px;
  }
  .chart-head { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
  .chart-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-dim);
    display: flex; align-items: center; gap: 6px;
  }
  .chart-title .ind { width: 8px; height: 8px; border-radius: 2px; }
  .chart-latest {
    font-size: 16px; font-weight: 800; font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  .chart-latest .unit { font-size: 11px; font-weight: 600; color: var(--text-dim); }
  .chart-svg { display: block; width: 100%; height: 120px; }
  .chart-foot { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-faint); font-variant-numeric: tabular-nums; }
  .chart-empty {
    height: 120px; display: grid; place-items: center;
    color: var(--text-faint); font-size: 11px;
    border: 1px dashed var(--border); border-radius: 6px;
  }
  .axis-label { fill: var(--text-faint); font-size: 9px; font-weight: 600; }
  .axis-line { stroke: var(--grid-line); stroke-width: 1; vector-effect: non-scaling-stroke; }
  .grid-line { stroke: var(--grid-line); stroke-width: 1; vector-effect: non-scaling-stroke; stroke-dasharray: 2 3; }

  /* ── Cache panel ─────────────────────────────────────────────────── */
  .cache-panel {
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
  }
  .cache-section { display: flex; flex-direction: column; gap: 8px; }
  .cache-section .cs-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-dim); }
  .occupancy-bar {
    height: 8px; border-radius: 4px; background: var(--bg-plot); overflow: hidden;
    border: 1px solid var(--border);
  }
  .occupancy-fill {
    height: 100%; border-radius: 3px;
    transition: width 0.4s ease;
  }
  .occupancy-text { display: flex; justify-content: space-between; font-size: 11px; font-variant-numeric: tabular-nums; }
  .occupancy-text .pct { font-size: 20px; font-weight: 800; color: var(--text); }
  .occupancy-text .frac { color: var(--text-dim); }

  .ratio-row { display: flex; align-items: center; gap: 12px; }
  .ratio-bar {
    flex: 1; height: 22px; border-radius: 4px; overflow: hidden;
    display: flex; border: 1px solid var(--border);
  }
  .ratio-bar .hit { background: var(--green); transition: width 0.4s ease; }
  .ratio-bar .miss { background: var(--yellow); transition: width 0.4s ease; }
  .ratio-bar .computed { background: var(--text-faint); transition: width 0.4s ease; }
  .ratio-legend { display: flex; gap: 12px; font-size: 10px; color: var(--text-dim); }
  .ratio-legend .lg { display: flex; align-items: center; gap: 4px; }
  .ratio-legend .lg .sw { width: 8px; height: 8px; border-radius: 2px; }

  .cache-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; }
  .cache-stats .kv { display: flex; justify-content: space-between; font-size: 11px; }
  .cache-stats .kv .k { color: var(--text-dim); }
  .cache-stats .kv .v { font-variant-numeric: tabular-nums; font-weight: 600; }

  /* ── Request table ───────────────────────────────────────────────── */
  .table-section { padding: 0 20px 20px; }
  .table-wrap {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; font-size: 12px; }
  thead { background: var(--bg-panel-2); }
  th, td { text-align: right; padding: 7px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { color: var(--text-dim); font-weight: 700; text-transform: uppercase; font-size: 9px; letter-spacing: 0.1em; }
  th:first-child, td:first-child { text-align: left; }
  tbody tr { transition: background 0.15s; }
  tbody tr:hover { background: rgba(77, 159, 255, 0.04); }
  tbody tr.cache-miss { box-shadow: inset 3px 0 0 var(--yellow); }
  tbody tr.cache-hit { box-shadow: inset 3px 0 0 var(--green); }
  tbody tr.cache-partial { box-shadow: inset 3px 0 0 var(--blue); }
  tbody tr.failed { box-shadow: inset 3px 0 0 var(--red); }
  .mode-badge {
    display: inline-block; padding: 1px 6px; border-radius: 3px;
    font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .mode-badge.mtp { color: var(--cyan); background: var(--cyan-dim); }
  .mode-badge.greedy { color: var(--text-dim); background: rgba(120,145,180,0.1); }
  .ok-cell { font-weight: 700; }
  .ok-cell.ok { color: var(--green); }
  .ok-cell.err { color: var(--red); }
  .null-val { color: var(--text-faint); }
  .dur-bar { display: inline-block; height: 4px; border-radius: 2px; background: var(--tone, var(--blue)); vertical-align: middle; margin-left: 4px; opacity: 0.5; }

  /* ── Responsive ──────────────────────────────────────────────────── */
  @media (max-width: 1100px) {
    .hero-grid { grid-template-columns: repeat(2, 1fr); }
    .chart-grid { grid-template-columns: repeat(2, 1fr); }
    .cache-panel { grid-template-columns: 1fr; }
  }
  @media (max-width: 640px) {
    .hero-grid { grid-template-columns: 1fr; }
    .chart-grid { grid-template-columns: 1fr; }
    .stat { min-width: 100px; }
    .topbar .meta { display: none; }
  }

  /* ── Subtle data-update animation ────────────────────────────────── */
  @keyframes flash {
    0% { background-color: rgba(77, 159, 255, 0.08); }
    100% { background-color: transparent; }
  }
  .hero.flash, .stat.flash { animation: flash 0.6s ease; }
</style>
</head>
<body>
<main class="shell">
  <!-- Top bar -->
  <div class="topbar">
    <div class="brand"><span class="dot"></span>peregrine</div>
    <div class="sep"></div>
    <div class="meta" id="meta">local inference telemetry</div>
    <div class="spacer"></div>
    <span class="status-pill connecting" id="status">connecting</span>
    <div class="sep"></div>
    <div class="poll-time" id="poll-time">—</div>
  </div>

  <!-- Hero KPI cards -->
  <div class="section-label">Key metrics</div>
  <div class="hero-grid" id="hero-grid"></div>

  <!-- Secondary stat strip -->
  <div class="section-label">Totals &amp; throughput</div>
  <div class="stat-strip" id="stat-strip"></div>

  <!-- Charts -->
  <div class="section-label">Trends</div>
  <div class="chart-grid" id="chart-grid"></div>

  <!-- Cache panel -->
  <div class="section-label">Prefix cache</div>
  <div class="cache-panel" id="cache-panel"></div>

  <!-- Request table -->
  <div class="section-label">Recent requests</div>
  <div class="table-section">
    <div class="table-wrap">
      <div class="table-scroll">
        <table id="req-table">
          <thead><tr>
            <th>id</th><th>mode</th><th>ok</th><th>prompt</th><th>gen</th>
            <th>reuse</th><th>computed</th><th>hit</th>
            <th>prefill</th><th>setup</th><th>ttft</th><th>decode</th>
            <th>tok/s</th><th>step</th><th>acc</th><th>draft</th>
          </tr></thead>
          <tbody id="req-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script>
"use strict";

/* ── Formatting helpers ────────────────────────────────────────────── */
const isNum = (v) => typeof v === "number" && Number.isFinite(v);
const dash = '<span class="null-val">–</span>';
const fmt = (v, d=1) => (v == null || !isNum(v)) ? dash : Number(v).toFixed(d);
const fmtInt = (v) => (v == null) ? dash : Number(v).toLocaleString();

function fmtAxis(v, opts = {}) {
  if (!isNum(v)) return "–";
  if (opts.percent) return `${(v * 100).toFixed(0)}%`;
  const av = Math.abs(v);
  if (av >= 1000000) return (v / 1000000).toFixed(1) + "M";
  if (av >= 1000) return (v / 1000).toFixed(1) + "k";
  if (av >= 100) return v.toFixed(0);
  if (av >= 10) return v.toFixed(1);
  return v.toFixed(2);
}

function fmtMs(v) {
  if (v == null || !isNum(v)) return dash;
  if (v >= 1000) return (v / 1000).toFixed(1) + "s";
  return Math.round(v) + "ms";
}

/* ── Data fetching ─────────────────────────────────────────────────── */
async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

/* ── Hero card builder ─────────────────────────────────────────────── */
function hero(label, value, unit, sub, tone) {
  const div = document.createElement("div");
  div.className = "hero";
  div.style.setProperty("--tone", tone);
  div.innerHTML =
    `<div class="h-label"><span class="ind"></span>${label}</div>` +
    `<div class="h-value">${value}${unit ? `<span class="unit">${unit}</span>` : ""}</div>` +
    `<div class="h-sub">${sub}</div>`;
  return div;
}

/* ── Mini sparkline for hero cards (ultra-compact) ─────────────────── */
function miniSpark(records, field, color) {
  const series = records.filter(r => r.ok && isNum(r[field])).map(r => Number(r[field]));
  if (series.length < 2) return "";
  const min = Math.min(...series), max = Math.max(...series);
  const range = max - min || 1;
  const W = 100, H = 28;
  const pts = series.map((v, i) =>
    `${(W * i / (series.length - 1)).toFixed(1)},${(H - H * (v - min) / range).toFixed(1)}`
  );
  return `<svg class="h-spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">` +
    `<polyline fill="none" stroke="${color}" stroke-width="1.5" points="${pts.join(" ")}"/></svg>`;
}

/* ── Full sparkline with axes for chart cards ──────────────────────── */
function sparkline(records, field, color, opts = {}) {
  const series = records
    .filter(r => r.ok && isNum(r[field]))
    .map(r => ({ id: r.request_id, value: Number(r[field]) }));
  if (series.length < 2) return { svg: '<div class="chart-empty">awaiting data</div>', latest: dash };

  const rawMin = Math.min(...series.map(p => p.value));
  const rawMax = Math.max(...series.map(p => p.value));
  let min = opts.min ?? rawMin;
  let max = opts.max ?? rawMax;
  // Padding so the line doesn't touch the edges
  if (!opts.min && !opts.max) {
    const pad = (max - min) * 0.08 || (opts.percent ? 0.02 : 1);
    min -= pad; max += pad;
  }
  if (max === min) { min -= 1; max += 1; }
  const range = max - min || 1;

  const W = 360, H = 120, left = 38, right = 8, top = 8, bottom = 20;
  const plotW = W - left - right;
  const plotH = H - top - bottom;
  const xFor = (i) => left + plotW * i / (series.length - 1);
  const yFor = (v) => top + plotH - plotH * (v - min) / range;
  const points = series.map((p, i) => `${xFor(i).toFixed(1)},${yFor(p.value).toFixed(1)}`);
  const area = `${left},${(top + plotH).toFixed(1)} ${points.join(" ")} ${xFor(series.length - 1).toFixed(1)},${(top + plotH).toFixed(1)}`;

  // Grid lines: top, mid, bottom
  const mid = min + range / 2;
  const last = series[series.length - 1];
  const first = series[0];
  const latestStr = fmtAxis(last.value, opts);

  const svg =
    `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img" aria-label="${field} chart">` +
    // grid
    `<line class="grid-line" x1="${left}" y1="${top}" x2="${W-right}" y2="${top}"/>` +
    `<line class="grid-line" x1="${left}" y1="${yFor(mid).toFixed(1)}" x2="${W-right}" y2="${yFor(mid).toFixed(1)}"/>` +
    `<line class="axis-line" x1="${left}" y1="${top+plotH}" x2="${W-right}" y2="${top+plotH}"/>` +
    // y labels
    `<text class="axis-label" x="2" y="${top + 7}">${fmtAxis(max, opts)}</text>` +
    `<text class="axis-label" x="2" y="${top + plotH + 3}">${fmtAxis(min, opts)}</text>` +
    // area + line
    `<polygon points="${area}" fill="${color}" opacity="0.06"/>` +
    `<polyline fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="${points.join(" ")}"/>` +
    // endpoint dot
    `<circle cx="${xFor(series.length-1).toFixed(1)}" cy="${yFor(last.value).toFixed(1)}" r="3" fill="${color}"/>` +
    `</svg>`;

  return { svg, latest: latestStr, firstId: first.id, lastId: last.id };
}

function chartCard(title, sparkResult, tone, unit) {
  const div = document.createElement("div");
  div.className = "chart-card";
  div.style.setProperty("--tone", tone);
  const color = getComputedStyle(document.documentElement).getPropertyValue(tone.replace("var(", "").replace(")", "").trim()).trim() || tone;
  const foot = sparkResult.firstId != null
    ? `<div class="chart-foot"><span>#${sparkResult.firstId}</span><span>#${sparkResult.lastId}</span></div>`
    : "";
  div.innerHTML =
    `<div class="chart-head"><div class="chart-title"><span class="ind" style="background:${tone}"></span>${title}</div>` +
    `<div class="chart-latest">${sparkResult.latest}${unit ? `<span class="unit">${unit}</span>` : ""}</div></div>` +
    sparkResult.svg + foot;
  return div;
}

/* ── Stat chip builder ─────────────────────────────────────────────── */
function stat(label, value, dim) {
  const div = document.createElement("div");
  div.className = "stat";
  div.innerHTML = `<div class="s-label">${label}</div><div class="s-value${dim ? " dim" : ""}">${value}</div>`;
  return div;
}

/* ── Main render ───────────────────────────────────────────────────── */
function updateDashboard(metrics, history) {
  const st = document.getElementById("status");
  const pt = document.getElementById("poll-time");
  const now = new Date();
  const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

  if (metrics.busy) {
    st.textContent = "busy";
    st.className = "status-pill busy";
  } else {
    st.textContent = "idle";
    st.className = "status-pill idle";
  }
  pt.textContent = `poll ${timeStr}`;

  const records = history.records || [];
  const oldestFirst = records;
  const newestFirst = records.slice().reverse();
  const latest = newestFirst[0] || {};
  const r = metrics.recent || {};
  const pc = metrics.prefix_cache || {};
  const totals = metrics;

  // ── Meta line ──
  const meta = document.getElementById("meta");
  const windowInfo = r.window_count != null ? `${r.window_count}/${r.window_capacity}` : "—";
  meta.textContent = `${fmtInt(totals.requests_total || 0)} requests · window ${windowInfo}`;

  // ── Hero cards ──
  const heroGrid = document.getElementById("hero-grid");
  heroGrid.innerHTML = "";
  const ttftSub = r.ttft_ms_avg != null ? `avg ${fmtMs(r.ttft_ms_avg)}` : "awaiting";
  heroGrid.appendChild(hero("TTFT", fmtMs(latest.ttft_ms), "", ttftSub, "var(--blue)"));

  const tokSub = r.decode_tok_s_avg != null ? `avg ${fmt(r.decode_tok_s_avg, 1)} tok/s` : "awaiting";
  heroGrid.appendChild(hero("Decode", fmt(latest.tok_s, 1), " tok/s", tokSub, "var(--green)"));

  const hitRatio = latest.prompt_tokens > 0
    ? (100 * latest.reuse_tokens / latest.prompt_tokens).toFixed(0) + "%"
    : dash;
  const hitSub = r.prefix_hit_ratio_avg != null ? `avg ${(100 * r.prefix_hit_ratio_avg).toFixed(1)}%` : "awaiting";
  heroGrid.appendChild(hero("Cache hit", hitRatio, "", hitSub, "var(--yellow)"));

  const accSub = r.mtp_acceptance != null ? `${(100 * r.mtp_acceptance).toFixed(0)}% weighted` : "no MTP yet";
  const accVal = latest.acceptance != null ? (100 * latest.acceptance).toFixed(0) + "%" : dash;
  heroGrid.appendChild(hero("MTP accept", accVal, "", accSub, "var(--cyan)"));

  // ── Stat strip ──
  const strip = document.getElementById("stat-strip");
  strip.innerHTML = "";
  strip.appendChild(stat("Requests", fmtInt(totals.requests_total || 0)));
  strip.appendChild(stat("Failed", fmtInt(totals.requests_failed || 0), true));
  strip.appendChild(stat("Prompt tok", fmtInt(totals.prompt_tokens_total || 0)));
  strip.appendChild(stat("Generated", fmtInt(totals.generated_tokens_total || 0)));
  strip.appendChild(stat("Reused", fmtInt(totals.reuse_tokens_total || 0)));
  strip.appendChild(stat("Computed", fmtInt(totals.computed_tokens_total || 0)));
  strip.appendChild(stat("Tok/step", fmt(r.tokens_per_step, 2)));
  strip.appendChild(stat("Evictions", fmtInt(pc.evictions ?? latest.cache_evictions_total ?? 0), true));

  // ── Charts ──
  const chartGrid = document.getElementById("chart-grid");
  chartGrid.innerHTML = "";
  const charts = [
    ["TTFT", "ttft_ms", "var(--blue)", null],
    ["Decode tok/s", "tok_s", "var(--green)", null],
    ["Prefix hit ratio", "prefix_hit_ratio", "var(--yellow)", { min: 0, max: 1, percent: true }],
    ["MTP acceptance", "acceptance", "var(--cyan)", { min: 0, max: 1, percent: true }],
    ["Tokens / step", "tokens_per_step", "var(--violet)", { min: 0 }],
    ["Prefill ms", "prefill_ms", "var(--red)", null],
  ];
  for (const [title, field, tone, opts] of charts) {
    const colorVal = tone.replace("var(", "").replace(")", "").trim();
    const spark = sparkline(oldestFirst, field, tone, opts);
    chartGrid.appendChild(chartCard(title, spark, tone, null));
  }

  // ── Cache panel ──
  const cachePanel = document.getElementById("cache-panel");
  const cacheReserved = pc.reserved_tokens ?? latest.cache_reserved_tokens;
  const cacheMax = pc.max_cache_tokens ?? latest.cache_max_cache_tokens;
  const cacheEntries = pc.resident_entries ?? latest.cache_resident_entries;
  const cacheResident = pc.resident_tokens ?? latest.cache_resident_tokens;
  const cachePinned = pc.pinned_entries ?? latest.cache_pinned_entries ?? 0;
  const cacheHits = pc.hits ?? 0;
  const cacheMisses = pc.misses ?? 0;
  const cacheHitTokens = pc.hit_tokens ?? 0;
  const cacheComputedTokens = pc.computed_tokens ?? 0;
  const cacheEvictions = pc.evictions ?? latest.cache_evictions_total ?? 0;
  const cacheTokenRatio = pc.token_hit_ratio;
  const occPct = (cacheReserved != null && cacheMax) ? (100 * cacheReserved / cacheMax) : null;
  const occColor = occPct != null && occPct > 85 ? "var(--red)" : occPct != null && occPct > 60 ? "var(--yellow)" : "var(--green)";

  // hit/miss/computed ratio bar
  const totalTokens = cacheHitTokens + cacheComputedTokens;
  const hitPct = totalTokens > 0 ? (100 * cacheHitTokens / totalTokens) : 0;
  const compPct = totalTokens > 0 ? (100 * cacheComputedTokens / totalTokens) : 0;

  cachePanel.innerHTML = `
    <div class="cache-section">
      <div class="cs-label">Occupancy</div>
      <div class="occupancy-text">
        <span class="pct">${occPct != null ? occPct.toFixed(0) + "%" : dash}</span>
        <span class="frac">${fmtInt(cacheReserved)} / ${fmtInt(cacheMax)} tokens</span>
      </div>
      <div class="occupancy-bar">
        <div class="occupancy-fill" style="width:${occPct != null ? occPct : 0}%;background:${occColor}"></div>
      </div>
      <div class="cache-stats">
        <div class="kv"><span class="k">entries</span><span class="v">${fmtInt(cacheEntries)}</span></div>
        <div class="kv"><span class="k">resident</span><span class="v">${fmtInt(cacheResident)}</span></div>
        <div class="kv"><span class="k">pinned</span><span class="v">${fmtInt(cachePinned)}</span></div>
        <div class="kv"><span class="k">logits cached</span><span class="v">${pc.cached_logits ?? "–"}</span></div>
      </div>
    </div>
    <div class="cache-section">
      <div class="cs-label">Token efficiency</div>
      <div class="ratio-bar">
        <div class="hit" style="width:${hitPct}%"></div>
        <div class="computed" style="width:${compPct}%"></div>
      </div>
      <div class="ratio-legend">
        <div class="lg"><span class="sw" style="background:var(--green)"></span>hit ${hitPct.toFixed(0)}% (${fmtInt(cacheHitTokens)})</div>
        <div class="lg"><span class="sw" style="background:var(--text-faint)"></span>computed ${compPct.toFixed(0)}% (${fmtInt(cacheComputedTokens)})</div>
      </div>
      <div class="cache-stats">
        <div class="kv"><span class="k">token hit ratio</span><span class="v">${cacheTokenRatio != null ? (100 * cacheTokenRatio).toFixed(1) + "%" : dash}</span></div>
        <div class="kv"><span class="k">evictions</span><span class="v">${fmtInt(cacheEvictions)}</span></div>
        <div class="kv"><span class="k">request hits</span><span class="v">${fmtInt(cacheHits)}</span></div>
        <div class="kv"><span class="k">request misses</span><span class="v">${fmtInt(cacheMisses)}</span></div>
      </div>
    </div>
    <div class="cache-section">
      <div class="cs-label">Prefill config</div>
      <div class="cache-stats">
        <div class="kv"><span class="k">chunk tokens</span><span class="v">${fmtInt(pc.prefill_chunk_tokens)}</span></div>
        <div class="kv"><span class="k">chunk group</span><span class="v">${fmtInt(pc.prefill_chunk_group_size)}</span></div>
        <div class="kv"><span class="k">max cache</span><span class="v">${fmtInt(cacheMax)}</span></div>
        <div class="kv"><span class="k">window</span><span class="v">${r.window_capacity ?? "–"}</span></div>
      </div>
    </div>
  `;

  // ── Request table ──
  const tbody = document.getElementById("req-body");
  tbody.innerHTML = "";
  const maxPrefill = Math.max(...newestFirst.filter(r => r.ok).map(r => r.prefill_ms || 0), 1);
  for (const rec of newestFirst) {
    const tr = document.createElement("tr");
    if (!rec.ok) {
      tr.className = "failed";
    } else if (rec.prompt_tokens > 0) {
      if (rec.reuse_tokens === 0) tr.className = "cache-miss";
      else if (rec.reuse_tokens < rec.prompt_tokens) tr.className = "cache-partial";
      else tr.className = "cache-hit";
    }
    const hitPct = rec.prompt_tokens > 0
      ? (100 * rec.reuse_tokens / rec.prompt_tokens).toFixed(0) + "%" : dash;
    const okCell = rec.ok
      ? '<span class="ok-cell ok">ok</span>'
      : `<span class="ok-cell err">${rec.error_kind || "err"}</span>`;
    const modeBadge = rec.mode === "mtp"
      ? '<span class="mode-badge mtp">mtp</span>'
      : '<span class="mode-badge greedy">greedy</span>';
    const durBar = rec.prefill_ms > 0
      ? `<span class="dur-bar" style="width:${Math.min(60, 60 * rec.prefill_ms / maxPrefill)}px;background:var(--yellow)"></span>`
      : "";
    tr.innerHTML = `<td>${rec.request_id}</td><td>${modeBadge}</td><td>${okCell}</td>` +
      `<td>${fmtInt(rec.prompt_tokens)}</td><td>${fmtInt(rec.generated_tokens)}</td>` +
      `<td>${fmtInt(rec.reuse_tokens)}</td><td>${fmtInt(rec.computed_tokens)}</td><td>${hitPct}</td>` +
      `<td>${fmtMs(rec.prefill_ms)}${durBar}</td><td>${fmtMs(rec.setup_ms)}</td>` +
      `<td>${fmtMs(rec.ttft_ms)}</td><td>${fmtMs(rec.decode_ms)}</td>` +
      `<td>${fmt(rec.tok_s, 1)}</td><td>${fmt(rec.tokens_per_step, 2)}</td>` +
      `<td>${rec.acceptance != null ? (100 * rec.acceptance).toFixed(0) + "%" : dash}</td>` +
      `<td>${rec.drafter_seed_ms != null ? fmtMs(rec.drafter_seed_ms) : dash}</td>`;
    tbody.appendChild(tr);
  }
}

/* ── Polling loop ──────────────────────────────────────────────────── */
async function poll() {
  try {
    const [metrics, history] = await Promise.all([
      fetchJSON("/v1/metrics"),
      fetchJSON("/v1/metrics/history"),
    ]);
    updateDashboard(metrics, history);
  } catch (e) {
    const st = document.getElementById("status");
    st.textContent = "error";
    st.className = "status-pill err";
  }
}

poll();
setInterval(poll, 1000);
</script>
</body>
</html>
